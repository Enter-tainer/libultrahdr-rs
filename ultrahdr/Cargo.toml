[package]
name = "ultrahdr"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["hdr", "jpeg", "gainmap", "image"]
categories = ["multimedia::images"]
description = "Pure Rust UltraHDR gain-map JPEG encoder/decoder"
exclude = ["/target", "/artifacts"]

[features]
default = []

[dependencies]
jpeg-decoder = "0.3"
jpeg-encoder = "0.6"
roxmltree = "0.20"
thiserror = "2"

[dev-dependencies]
anyhow.workspace = true
